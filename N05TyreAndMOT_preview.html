function HeroSection(){
  const [plate,setPlate]=useState('');
  const [submitted,setSubmitted]=useState(false);
  const [lookupLoading,setLookupLoading]=useState(false);
  const onChange=e=>{
    const v=e.target.value.toUpperCase().replace(/[^A-Z0-9 ]/g,'').slice(0,8);
    setPlate(v);setSubmitted(false);
  };
  const onBookNow=async ()=>{
    if(!plate.trim()){ setSubmitted(true); return; }
    const vrm=plate.replace(/\s/g,'').toUpperCase();
    setLookupLoading(true);
    try{
      const r=await fetch('/api/vehicle/lookup?vrm='+encodeURIComponent(vrm));
      const data=await r.json();
      if(r.ok && !data._fromMock) sessionStorage.setItem('N05_vehicle_'+vrm,JSON.stringify(data));
    }catch(e){}
    setLookupLoading(false);
    setSubmitted(true);
  };

    minHeight:'90vh',display:'flex',alignItems:'center',
    overflow:'hidden',position:'relative',

    h('div',{className:'tyre-ring'}),

          background:'rgba(254,222,0,.12)',border:'1px solid rgba(254,222,0,.5)',

          h('span',{style:{fontSize:16}},'🔥'),
          h('span',{style:{color:T.yellow,fontSize:13,fontWeight:700}},'SPECIAL OFFER — Limited Time Only')

          margin:'0 0 20px',fontWeight:900,lineHeight:1.05,
          fontSize:'clamp(2.2rem,4.5vw,3.8rem)',color:T.white,
        }},
          'MOT + SERVICE',h('br'),
          h('span',{className:'shimmer-text'},'BOOK FOR ' + (typeof HERO_BOOK_PRICE !== 'undefined' ? HERO_BOOK_PRICE : '£19')),
          h('br'),
          h('span',{style:{color:T.yellow}},'SAVE ' + (typeof HERO_SAVE !== 'undefined' ? HERO_SAVE : '£31') + '!'),

function App(){

  useEffect(()=>{
    const fn=()=>setScrolled(window.scrollY>60);
    window.addEventListener('scroll',fn,{passive:true});
    return ()=>window.removeEventListener('scroll',fn);
  },[]);
  return h('div',{style:{fontFamily:"'Inter',ui-sans-serif,system-ui"}},
    h(TopBar),
    h(Header,{scrolled}),
    h(HeroSection),
    h(TrustBar),
    h(CollectionBanner),
    h(ComboDeals),
    h(ServicesSection),
    h(BenefitsSection),
    h(FAQSection),
    h(CTABanner),
    h(Footer),
  );
}

(async function init(){
  try {
    const data = await (window.N05ServicesLoader && N05ServicesLoader.loadServices ? N05ServicesLoader.loadServices() : fetch('/data/services.json?v='+Date.now()).then(r=>r.json()));
    const map = (window.N05ServicesLoader && N05ServicesLoader.getPriceMap) ? N05ServicesLoader.getPriceMap(data) : { byValue:{}, byId:{} };
    const byId = map.byId || {};
    const byValue = map.byValue || {};

    if (byId['mot-full-service']) {
      const combo = byId['mot-full-service'];
      STATS[0].value = combo.priceDisplay || STATS[0].value;
      COMBOS[0].price = combo.priceDisplay || COMBOS[0].price;
      FOOTER_MOT_PRICE = combo.priceDisplay || FOOTER_MOT_PRICE;
      const heroMOT = combo.heroMOTPrice != null ? combo.heroMOTPrice : 19;
      HERO_BOOK_PRICE = '£' + (Number(heroMOT) === heroMOT ? heroMOT : parseInt(heroMOT, 10) || 19);
      const motTest = byId['mot-test'];
      HERO_SAVE = motTest && motTest.price != null ? '£' + Math.round(motTest.price - (Number(heroMOT) === heroMOT ? heroMOT : parseInt(heroMOT, 10) || 19)) : '£31';
      const faq = FAQS.find(f=>f.a&&f.a.indexOf('£19')>=0);
      if (faq) faq.a = faq.a.replace('£19', combo.priceDisplay || '£19');
    }
    if (byId['mot-major-service']) COMBOS[1].price = byId['mot-major-service'].priceDisplay || COMBOS[1].price;

    const titleMap = { 'Full Service':'Full Service', 'Major Service':'Major Service', 'MOT Test':'MOT Test', 'Tyre Fitting':'Tyre Fitting', 'Brakes & Discs':'Brakes & Discs', 'Exhaust Systems':'Exhaust Systems', 'Window Tinting':'Window Tinting', 'Van Servicing':'Van Servicing' };
    SERVICES.forEach(function(s){
      const svc = byValue[s.title] || byValue[titleMap[s.title]];
      if (svc && svc.priceLabel) s.price = svc.priceLabel;
    });
  } catch(e){}
  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
})();
</script>
