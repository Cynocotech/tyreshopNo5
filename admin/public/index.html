function HeroSection(){
  const [plate,setPlate]=useState('');
  const [submitted,setSubmitted]=useState(false);
  const [lookupLoading,setLookupLoading]=useState(false);
  const [lookupOk,setLookupOk]=useState(false);
  const [lookupError,setLookupError]=useState('');
  const onChange=e=>{
    const v=e.target.value.toUpperCase().replace(/[^A-Z0-9 ]/g,'').slice(0,8);
    setPlate(v);setSubmitted(false);setLookupError('');
  };
  const onBookNow=async ()=>{
    if(!plate.trim()){ setSubmitted(true); return; }
    const vrm=plate.replace(/\s/g,'').toUpperCase();
    setLookupLoading(true);
    setLookupError('');
    try{
      const r=await fetch('/admin/api/vehicle/lookup?vrm='+encodeURIComponent(vrm));
      const data=await r.json();
      if(r.ok){
        if(!data._fromMock) sessionStorage.setItem('N05_vehicle_'+vrm,JSON.stringify(data));
        setLookupOk(true);
      }else{
        setLookupOk(false);
        setLookupError(data.detail||data.error||'Vehicle not found. Try again or book anyway.');
      }
    }catch(e){
      setLookupOk(false);
      setLookupError('Lookup failed. Make sure the server is running on port 3001.');
    }
    setLookupLoading(false);
    setSubmitted(true);
  };
  return h('section',{id:'book',className:'hero-bg',style:{
    minHeight:'90vh',display:'flex',alignItems:'center',
    overflow:'hidden',position:'relative',

          h('p',{style:{color:'rgba(255,255,255,.45)',fontSize:11,fontWeight:700,

          h('div',{style:{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}},

/* Fetch admin settings before first render so prices come from admin only */
(async function init(){
  try {
    var load = window.N05ServicesLoader&&N05ServicesLoader.loadServices ? N05ServicesLoader.loadServices() : fetch('/data/services.json?v='+Date.now()).then(function(r){ return r.ok?r.json():Promise.reject(new Error('unavailable')); });
    var data = await Promise.race([load.catch(function(){ return {services:[],categories:{},settings:{}}; }), new Promise(function(r){ setTimeout(function(){ r({services:[],categories:{},settings:{}}); }, 2000); })]);
    const settings = data.settings || {};
    if (settings.opening_hours_display && String(settings.opening_hours_display).trim()) OPENING_HOURS_DISPLAY = String(settings.opening_hours_display).trim();
    if (settings.logo_url && String(settings.logo_url).trim()) LOGO_URL = String(settings.logo_url).trim();
    if (settings.tagline && String(settings.tagline).trim()) HEADER_TAGLINE = String(settings.tagline).trim();
    if (data.categories && data.categories['special-offers']) COMBO_SECTION_BADGE = data.categories['special-offers'].label;
    SHOW_UPDATE_NOTICE = (data.settings && data.settings.show_update_notice === '1');
    var s = data.settings || {};
    if (s.combo_section_title) COMBO_SECTION_TITLE = s.combo_section_title;
    if (s.combo_section_intro) COMBO_SECTION_INTRO = s.combo_section_intro;
    if (s.combo_combined_desc) COMBO_COMBINED_DESC = s.combo_combined_desc;
    if (s.footer_offer_title) FOOTER_OFFER_TITLE = s.footer_offer_title;
    if (s.footer_offer_subtitle) FOOTER_OFFER_SUBTITLE = s.footer_offer_subtitle;
    if (s.footer_offer_label) FOOTER_OFFER_LABEL = s.footer_offer_label;
    if (s.footer_offer_was_price) FOOTER_OFFER_WAS_PRICE = s.footer_offer_was_price;
    if (s.footer_offer_save) FOOTER_OFFER_SAVE = s.footer_offer_save;
    if (s.footer_offer_feature) FOOTER_OFFER_FEATURE = s.footer_offer_feature;
    if (s.footer_offer_btn || s.footer_offer_btn_text) FOOTER_OFFER_BTN = s.footer_offer_btn || s.footer_offer_btn_text;
    if (s.footer_offer_disclaimer) FOOTER_OFFER_DISCLAIMER = s.footer_offer_disclaimer;
    if (s.combo_section_title) COMBO_SECTION_TITLE = s.combo_section_title;
    if (s.combo_section_intro) COMBO_SECTION_INTRO = s.combo_section_intro;
    if (s.combo_combined_desc) COMBO_COMBINED_DESC = s.combo_combined_desc;
    const map = (window.N05ServicesLoader && N05ServicesLoader.getPriceMap) ? N05ServicesLoader.getPriceMap(data) : { byValue:{}, byId:{} };
    const byId = map.byId || {};
    const byValue = map.byValue || {};
    var comboServices = (data.services || []).filter(function(x){ return x.category === 'special-offers'; });
    COMBOS.length = 0;
    comboServices.forEach(function(svc){
      var ex = SERVICE_EXTRAS[svc.id] || {};
      COMBOS.push({
        id: svc.id,
        badge: svc.comboBadge || ex.badge || 'SAVE AT LEAST £31',
        title: svc.title,
        subtitle: svc.comboSubtitle || 'Special Offer',
        includes: (svc.comboFeatures && svc.comboFeatures.length) ? svc.comboFeatures : (ex.features || []),
        price: (svc.comboDisplayPrice && String(svc.comboDisplayPrice).trim()) ? String(svc.comboDisplayPrice).trim() : (svc.priceDisplay || ''),
        saving: svc.comboSaving || 'Save £31+',
        hot: !!svc.isComboHot
      });
    });

    function parsePrice(v) {
      if (v == null || v === '') return null;
      if (typeof v === 'number' && !isNaN(v)) return v;
      const n = parseFloat(String(v).replace(/[£,\s]/g, ''));
      return isNaN(n) ? null : n;
    }
    var s2 = data.settings || {};
    var combo = byId['mot-full-service'];
    var heroMOT = parsePrice(s2.hero_book_price) ?? (combo ? parsePrice(combo.heroMOTPrice) : null);
    HERO_BOOK_PRICE = heroMOT != null ? '£' + heroMOT : '';
    var motTest = byId['mot-test'];
    HERO_SAVE = (s2.hero_save && String(s2.hero_save).trim()) ? String(s2.hero_save).trim() : (motTest && motTest.price != null && heroMOT != null ? '£' + Math.round(motTest.price - heroMOT) : '');
    FOOTER_MOT_PRICE = (s2.footer_mot_price && String(s2.footer_mot_price).trim()) ? String(s2.footer_mot_price).trim() : (combo ? combo.priceDisplay : '') || '';
    if (combo) {
      STATS[0].value = FOOTER_MOT_PRICE || combo.priceDisplay || '';
      STATS[0].sub = HERO_SAVE ? 'Save ' + HERO_SAVE + ' today' : '';
      COMBOS[0].price = combo.priceDisplay || STATS[0].value || '';
      var faq = FAQS.find(f=>f.a&&f.a.indexOf('£19')>=0);
      if (faq) faq.a = faq.a.replace(/£19/g, combo.priceDisplay || HERO_BOOK_PRICE || '—');
    }
    if (byId['mot-major-service']) COMBOS[1].price = byId['mot-major-service'].priceDisplay || COMBOS[1].price;

    const catOrder = { 'special-offers': 1, 'servicing-mot': 2, 'tyres-other': 3 };
    const list = (data.services || []).slice().sort(function(a, b) {
      return (catOrder[a.category] || 99) - (catOrder[b.category] || 99);
    });
    SERVICES.length = 0;
    list.forEach(function(s) {
      const ex = SERVICE_EXTRAS[s.id] || {};
      SERVICES.push({
        icon: s.icon || '📌',
        title: s.title,
        badge: ex.badge || (s.isQuote ? 'QUOTE' : '£' + s.price),
        desc: ex.desc || 'Professional ' + s.title + ' at competitive prices. Book online for North London.',
        features: ex.features || ['Free collection & delivery', 'Expert technicians', 'Quality guaranteed'],
        price: s.priceLabel || s.priceDisplay || (s.isQuote ? 'Free Quote' : '£' + s.price)
      });
    });
  } catch(e){ console.error('N05 init:',e); }
  try { doRender(); } catch(e) { console.error('N05 render:', e); showErr(e.message || 'Failed to render app'); }
})();
})();
</script>
</body>
</html>
