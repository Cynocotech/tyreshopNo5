    body { background: #1B263B; min-height: 100vh; color: #fff; font-family: Inter, sans-serif; margin: 0; }
    .thank-you-wrap { max-width: 600px; margin: 0 auto; padding: 48px 24px; text-align: center; }
    .thank-you-icon { font-size: 4rem; margin-bottom: 16px; }
    .thank-you-wrap h1 { font-size: 2rem; margin: 0 0 12px; font-weight: 900; }
    .thank-you-wrap .sub { color: rgba(255,255,255,.8); font-size: 18px; margin-bottom: 32px; }
    .info-card { background: rgba(255,255,255,.08); border-radius: 16px; border: 1px solid rgba(255,255,255,.15); padding: 28px; margin-bottom: 24px; text-align: left; }
    .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.1); }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: rgba(255,255,255,.6); font-size: 14px; }
    .info-value { font-weight: 700; font-size: 16px; }
    .location-box { background: rgba(254,222,0,.15); border: 1px solid rgba(254,222,0,.4); border-radius: 12px; padding: 20px; margin-top: 24px; }

<div class="thank-you-wrap">
  <div class="thank-you-icon">✓</div>

  <div class="info-card">
    <div class="info-row">
      <span class="info-label">Booking reference</span>
      <span class="info-value" id="ref">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Date & time</span>
      <span class="info-value" id="datetime">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Service</span>
      <span class="info-value" id="service">—</span>
    </div>
  </div>

  <div class="location-box">
    <div class="addr">📍 6A Bourne Hill, Southgate, London N13 4LG</div>
    <div class="phone">📞 07895 859505</div>
    <div class="hours">🕐 Mon–Sat 8am–6pm</div>
  </div>

  <a href="/" class="btn-home">Return to Home</a>
</div>
<script>
(function() {
  const p = new URLSearchParams(window.location.search);
  const ref = p.get('booking') || p.get('ref');
  const date = p.get('date');
  const time = p.get('time');
  const service = p.get('service') || 'MOT / Service';

  if (ref) document.getElementById('ref').textContent = ref;
  if (date && time) document.getElementById('datetime').textContent = date + ' at ' + time;
  else if (date) document.getElementById('datetime').textContent = date;
  if (service) document.getElementById('service').textContent = decodeURIComponent(service);

  // GTM: track conversion
  if (window.dataLayer && ref) {
    dataLayer.push({ event: 'booking_confirmation', booking_id: ref });
  }
})();
</script>
