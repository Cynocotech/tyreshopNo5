version: '3.8'

services:

  # Front site + booking API (Node.js)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - db_data:/app/admin/database
    env_file: .env
    restart: unless-stopped
    depends_on:
      - admin

  # Admin panel (Laravel PHP)
  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "8000:80"
    volumes:
      - db_data:/var/www/html/admin/database
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${ADMIN_URL:-http://localhost:8000}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/admin/database/database.sqlite
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-N05 Tyre & MOT}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    restart: unless-stopped

volumes:
  db_data:
    # Persistent volume — SQLite database survives re-deploys
